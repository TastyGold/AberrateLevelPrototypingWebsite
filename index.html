<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Level Editor</title>
<link href="style.css" rel="stylesheet" />
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div id="topBar" class="bar">
    <div class="bar-content">
      <h1>Level Editor</h1>
      <div class="level-info">
        <input type="text" id="levelName" placeholder="Level Name" value="Untitled">
      </div>
      <div class="level-actions">
        <button id="hotkeyBtn" data-inactiveText="Show Hotkeys" data-activeText="Hide Hotkeys"></button>
        <button id="importBtn">Import</button>
        <button id="exportBtn">Export</button>
      </div>
    </div>
  </div>

  <!-- Canvas Area -->
  <div id="canvasContainer">
    <canvas id="editor" class="js-noMenu"></canvas>
    <div id="entityPalette" class="entity-palette hidden">
    </div>
  </div>

  <!-- Bottom Bar (Tools) -->
  <div id="bottomBar" class="bar">
    <div class="bar-content">
      <button class="tool-btn active" data-tool="camera" data-text="Camera"></button>
      <button class="tool-btn" data-tool="select" data-text="Select"></button>
      <button class="tool-btn" data-tool="entity" data-text="Entities"></button>
      <button class="tool-btn" data-tool="room" data-text="Rooms"></button>
      <button class="tool-btn" data-tool="erase" data-text="Erase"></button>
    </div>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
